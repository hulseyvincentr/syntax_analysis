name: syntax_analysis
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip

  # Core analysis
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - statsmodels

  # Plotting
  - matplotlib
  - seaborn
  - plotly

  # Notebooks
  - jupyterlab
  - notebook
  - ipykernel

  # IDE
  - spyder
  - spyder-kernels

  # Utilities
  - tqdm
  - joblib
  - pyyaml
  - openpyxl

  # Audio/signal helpers
  - librosa
  - pysoundfile
  - numba
  - h5py
  - scikit-image
  - networkx

  # pip-only (often missing on osx-arm64 conda-forge)
  - pip:
      - kaleido
